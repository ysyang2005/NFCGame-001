<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽閣尋蹤 - 殘缺的對聯</title>
    <style>
        :root {
            --paper: #e6d5b8;
            --ink: #2a1f1a;
            --highlight: #8b2635;
            --border: #5d4037;
            --hint-color: #4a4a4a;
            --error-color: #b22222; /* 錯誤紅色 */
            --font-main: "Source Han Serif TC", "Noto Serif TC", "Songti TC", serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-main);
            padding: 20px;
        }

        .parchment {
            position: relative;
            width: 100%;
            max-width: 450px;
            min-height: 600px;
            background: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            padding: 60px 30px;
            border: 2px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .fade-in { opacity: 0; animation: fadeIn 2.5s ease-in-out forwards; }

        .quest-header { text-align: center; margin-bottom: 50px; border-bottom: 1px solid rgba(93, 64, 55, 0.2); padding-bottom: 20px; }
        .quest-title { font-size: 28px; color: var(--highlight); letter-spacing: 5px; font-weight: 900; }
        .quest-subtitle { font-size: 14px; color: var(--ink); margin-top: 10px; letter-spacing: 3px; opacity: 0.8; }

        .instruction-block { width: 100%; text-align: center; margin-bottom: 40px; }
        .instruction-text { font-size: 16px; color: var(--border); line-height: 2; font-style: italic; }

        /* 詩句與輸入區域 */
        .riddle-box { 
            width: 100%; font-size: 22px; color: var(--ink); font-weight: bold; 
            padding: 25px; text-align: center; line-height: 2.5; min-height: 150px;
        }
        
        .poem-input {
            width: 35px; border: none; border-bottom: 2px solid var(--highlight);
            background: transparent; text-align: center; font-size: 22px;
            color: var(--ink); /* 正確顯示為黑色/深墨色 */
            font-weight: bold; outline: none; margin: 0 5px;
            font-family: var(--font-main);
            transition: all 0.3s;
        }

        /* 錯誤狀態：紅色 */
        .input-error {
            color: var(--error-color) !important;
            border-bottom: 2px solid var(--error-color) !important;
        }

        .hint-text { margin-top: 30px; font-size: 14px; color: var(--hint-color); font-weight: bold; height: 20px; opacity: 0; }
        .visible { opacity: 1; transition: opacity 2s; }
    </style>
</head>
<body>

    <div class="parchment">
        <div class="quest-header fade-in" style="animation-delay: 0.5s;">
            <h1 class="quest-title">殘缺的對聯</h1>
            <p class="quest-subtitle">媽閣廟正門</p>
        </div>

        <div class="instruction-block fade-in" style="animation-delay: 2.5s;">
            <div class="instruction-text">
                欲解前路封印，先補殘聯闕字，<br>
                字成詩現，自引你尋岩間古石。
            </div>
        </div>

        <div class="riddle-box fade-in" style="animation-delay: 5.0s;" id="poem-container">
            德周化<input type="text" class="poem-input" id="in1" maxlength="1" oninput="checkInput(this, '宇')">，<br>
            澤<input type="text" class="poem-input" id="in2" maxlength="1" oninput="checkInput(this, '潤')">生民。
        </div>

        <div id="hint-1" class="hint-text">「等等，我好像在門口見到過類似的對聯」</div>
        <div id="hint-2" class="hint-text">「這不就是正門口的對聯麼」</div>
    </div>

    <script>
        // 提示顯示
        setTimeout(() => { document.getElementById('hint-1').classList.add('visible'); }, 8000);
        setTimeout(() => { document.getElementById('hint-2').classList.add('visible'); }, 16000);

        const fullPoem = "德周化宇涵滄海，\n澤潤生民庇水濱。\n山岩隱跡鐫古刻，\n石上孤帆倚岸鄰。";
        const container = document.getElementById('poem-container');

        // 單字驗證函數
        function checkInput(el, correctChar) {
            if (el.value === "") {
                el.classList.remove('input-error');
            } else if (el.value !== correctChar) {
                el.classList.add('input-error');
            } else {
                el.classList.remove('input-error');
            }
            
            // 檢查是否兩者皆正確
            const in1 = document.getElementById('in1');
            const in2 = document.getElementById('in2');
            
            if (in1.value === '宇' && in2.value === '潤') {
                document.querySelectorAll('.hint-text').forEach(el => el.style.display = 'none');
                container.innerHTML = ''; // 清空輸入框
                typeWriter(0);
            }
        }

        // 逐字打印效果
        function typeWriter(index) {
            if (index < fullPoem.length) {
                const char = fullPoem.charAt(index);
                if (char === '\n') {
                    container.innerHTML += '<br>';
                } else {
                    container.innerHTML += char;
                }
                index++;
                setTimeout(() => typeWriter(index), 250); 
            }
        }
    </script>
</body>
</html>
