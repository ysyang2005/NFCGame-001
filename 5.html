<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時空信物 - 突破重圍</title>
    <style>
        :root {
            --paper: #e6d5b8;
            --ink: #2a1f1a;
            --highlight: #8b2635;
            --gold: #d4af37;
            --border: #5d4037;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: "BiauKai", "Kaiti TC", "Kaiti", "STKaiti", serif;
            padding: 20px;
        }

        /* --- 統一的長方形信紙容器 --- */
        .parchment {
            position: relative;
            width: 100%;
            max-width: 450px;
            background: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            padding: 50px 25px;
            border: 2px solid var(--border);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 85vh;
        }

        /* --- 1. 頂部文案：最先顯現 --- */
        .congrats-header {
            opacity: 0;
            animation: fadeInDown 1.2s ease forwards 0.5s;
            margin-bottom: 20px;
            text-align: center;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .congrats-title {
            font-size: 28px;
            color: var(--highlight);
            letter-spacing: 5px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .congrats-subtitle {
            font-size: 14px;
            color: var(--ink);
            letter-spacing: 2px;
            border-top: 1px solid rgba(139, 38, 53, 0.2);
            padding-top: 10px;
        }

        /* --- 2. 扇形卡牌區域：逐步展開 --- */
        .card-fan-container {
            position: relative;
            width: 100%;
            height: 300px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .reward-card {
            position: absolute;
            left: 50%;
            bottom: 20px;
            width: 150px;
            height: 220px;
            background: #fff;
            margin-left: -75px;
            border: 3px solid var(--gold);
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform-origin: bottom center;
            opacity: 0; /* 初始隱藏 */
        }

        .card-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-bottom: 1px solid var(--gold);
        }

        .card-content {
            padding: 8px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff;
        }

        .coupon-label { font-size: 10px; color: var(--highlight); font-weight: bold; }
        .coupon-title { font-size: 13px; color: var(--ink); margin-top: 4px; font-weight: 900; }

        /* 卡牌出現並展開的動畫 */
        @keyframes cardSpread1 { 
            from { opacity: 0; transform: rotate(0) translateX(0); }
            to { opacity: 1; transform: rotate(-18deg) translateX(-85px); }
        }
        @keyframes cardSpread2 { 
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardSpread3 { 
            from { opacity: 0; transform: rotate(0) translateX(0); }
            to { opacity: 1; transform: rotate(18deg) translateX(85px); }
        }

        .card-1 { animation: cardSpread1 1.2s ease forwards 1.5s; }
        .card-2 { animation: cardSpread2 1.2s ease forwards 2.0s; }
        .card-3 { animation: cardSpread3 1.2s ease forwards 2.5s; }

        .reward-card:hover {
            z-index: 100 !important;
            transform: scale(1.1) translateY(-20px) rotate(0deg) !important;
            border-color: var(--highlight);
        }

        /* --- 3. 底部說明文字：隨後顯現 --- */
        .footer-hint {
            opacity: 0;
            font-size: 13px;
            color: #7a6a5a;
            line-height: 1.8;
            margin-top: 10px;
            text-align: center;
            animation: fadeIn 1.5s ease forwards 4.0s;
        }

        /* --- 4. 底部按鈕：最後顯現 --- */
        .seal-btn-container {
            margin-top: auto;
            padding-top: 30px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 5.0s;
        }

        .seal-btn {
            cursor: pointer;
            width: 70px; height: 70px;
            background: var(--highlight);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--paper); font-size: 13px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="parchment">
        <div class="congrats-header">
            <h1 class="congrats-title">突破重圍</h1>
            <p class="congrats-subtitle">恭喜突破第一個謎題：娘媽之秘</p>
        </div>

        <div class="card-fan-container">
            <div class="reward-card card-1" onclick="alert('已領取：2.jpg 對應優惠')">
                <img src="2.jpg" class="card-img" alt="獎勵1" onerror="this.src='https://via.placeholder.com/150x120?text=2.jpg'">
                <div class="card-content">
                    <span class="coupon-label">犒賞 ‧ 壹</span>
                    <h3 class="coupon-title">古道尋幽<br>專屬優惠</h3>
                </div>
            </div>

            <div class="reward-card card-2" onclick="alert('已領取：3.jpg 對應優惠')">
                <img src="3.jpg" class="card-img" alt="獎勵2" onerror="this.src='https://via.placeholder.com/150x120?text=3.jpg'">
                <div class="card-content">
                    <span class="coupon-label">犒賞 ‧ 貳</span>
                    <h3 class="coupon-title">時空信物<br>現折禮遇</h3>
                </div>
            </div>

            <div class="reward-card card-3" onclick="alert('已領取：4.jpg 對應優惠')">
                <img src="4.jpg" class="card-img" alt="獎勵3" onerror="this.src='https://via.placeholder.com/150x120?text=4.jpg'">
                <div class="card-content">
                    <span class="coupon-label">犒賞 ‧ 參</span>
                    <h3 class="coupon-title">鏡海遺珍<br>精美贈禮</h3>
                </div>
            </div>
        </div>

        <p class="footer-hint">
            探尋者，這是屬於你的榮譽犒賞。<br>
            點擊卡牌即可將「時空信物」收納至囊中。<br>
            旅程尚未結束，前方仍有未知...
        </p>

        <div class="seal-btn-container" onclick="location.href='6.html'">
            <div class="seal-btn">再啟<br>征途</div>
        </div>
    </div>

</body>
</html>
